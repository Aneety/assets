<body class="bg-background text-on-background font-body-md antialiased">

<button class="material-symbols-outlined text-primary dark:text-primary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors active:scale-95 duration-150 p-2 rounded-full" data-icon="arrow_back">arrow_back</button>
<h1 class="ml-4 font-headline-sm text-headline-sm text-primary dark:text-primary-fixed-dim">Avaliar Fornecedor</h1>
</header>
<main class="pt-20 pb-24 px-container-margin-mobile max-w-md mx-auto space-y-6">
<!-- Order Summary Card -->
<div class="bg-surface border border-outline-variant rounded-xl p-density-comfortable shadow-sm">
<div class="flex items-center justify-between mb-2">
<span class="font-data-mono text-data-mono text-on-surface-variant">#2948</span>
<span class="bg-primary-container/10 text-primary px-2 py-0.5 rounded-full text-label-caps font-label-caps">PEDIDO CONCLUÍDO</span>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-1">Coroa Zircônia Translúcida</h2>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]" data-icon="store">store</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">Laboratório Central</p>
</div>
</div>
<!-- Rating Sections -->
<section class="space-y-6">
<!-- Product Quality -->
<div class="space-y-3">
<label class="font-body-lg text-body-lg text-on-surface font-semibold block">Qualidade do Produto</label>
<div class="flex gap-2">
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="1" onclick="rate(this, 'quality')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="2" onclick="rate(this, 'quality')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="3" onclick="rate(this, 'quality')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="4" onclick="rate(this, 'quality')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="5" onclick="rate(this, 'quality')">star</button>
</div>
</div>
<!-- Delivery Time -->
<div class="space-y-3">
<label class="font-body-lg text-body-lg text-on-surface font-semibold block">Tempo de Entrega</label>
<div class="flex gap-2 mb-3">
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="1" onclick="rate(this, 'delivery')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="2" onclick="rate(this, 'delivery')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="3" onclick="rate(this, 'delivery')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="4" onclick="rate(this, 'delivery')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="5" onclick="rate(this, 'delivery')">star</button>
</div>
<div class="flex gap-2">
<button class="flex-1 py-2 rounded-xl border border-outline-variant text-body-sm font-medium hover:bg-surface-container-low transition-colors" onclick="toggleStatus(this)">No Prazo</button>
<button class="flex-1 py-2 rounded-xl border border-outline-variant text-body-sm font-medium hover:bg-surface-container-low transition-colors" onclick="toggleStatus(this)">Atrasado</button>
</div>
</div>
<!-- Communication -->
<div class="space-y-3">
<label class="font-body-lg text-body-lg text-on-surface font-semibold block">Profissionalismo e Comunicação</label>
<div class="flex gap-2">
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="1" onclick="rate(this, 'comm')">star</button>
<button class="rating-star material-symbols-outlined text-tertiary text-[32px]" data-icon="star" data-value="2" onclick="rate(this, 'comm')">star</button>

<button class="absolute top-1 right-1 bg-error text-on-error rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[16px]" data-icon="close">close</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-4 rounded-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Enviar Avaliação</span>
<span class="material-symbols-outlined" data-icon="send">send</span>

<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-container text-on-secondary-container dark:text-secondary-container rounded-full px-4 py-1 hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200" href="#">

<span class="font-label-caps text-label-caps">Pedidos</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="chat">chat</span>

</a>

<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-caps text-label-caps">Perfil</span>
</a>
</nav>
<script>
        function rate(el, category) {
            const stars = el.parentElement.querySelectorAll('.rating-star');
            const rating = parseInt(el.getAttribute('data-value'));
            
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('star-active');
                    star.style.fontVariationSettings = "'FILL' 1";
                } else {
                    star.classList.remove('star-active');
                    star.style.fontVariationSettings = "'FILL' 0";
                }
            });
        }

        function toggleStatus(btn) {
            const siblings = btn.parentElement.querySelectorAll('button');
            siblings.forEach(s => {
                s.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary-container');
                s.classList.add('border-outline-variant');
            });
            btn.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary-container');
            btn.classList.remove('border-outline-variant');
        }
    </script>
</body></html>
